defaultNamespace: ns-067
labels:
  app: busybox-suite
  instance: "067"

# Resources to be deployed
resourceLabels:
  heritage: fleet

---
apiVersion: v1
kind: Namespace
metadata:
  name: ns-067
---
apiVersion: v1
kind: Pod
metadata:
  name: busybox-pod
  namespace: ns-067
spec:
  containers:
  - name: busybox
    image: busybox
    args: [/bin/sh, -c, "sleep 3600"]
