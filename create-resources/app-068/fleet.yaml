defaultNamespace: ns-068
labels:
  app: busybox-suite
  instance: "068"

# Resources to be deployed
resourceLabels:
  heritage: fleet

---
apiVersion: v1
kind: Namespace
metadata:
  name: ns-068
---
apiVersion: v1
kind: Pod
metadata:
  name: busybox-pod
  namespace: ns-068
spec:
  containers:
  - name: busybox
    image: busybox
    args: [/bin/sh, -c, "sleep 3600"]
