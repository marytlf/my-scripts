defaultNamespace: ns-070
labels:
  app: busybox-suite
  instance: "070"

# Resources to be deployed
resourceLabels:
  heritage: fleet

---
apiVersion: v1
kind: Namespace
metadata:
  name: ns-070
---
apiVersion: v1
kind: Pod
metadata:
  name: busybox-pod
  namespace: ns-070
spec:
  containers:
  - name: busybox
    image: busybox
    args: [/bin/sh, -c, "sleep 3600"]
