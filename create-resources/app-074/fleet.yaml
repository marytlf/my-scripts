defaultNamespace: ns-074
labels:
  app: busybox-suite
  instance: "074"

# Resources to be deployed
resourceLabels:
  heritage: fleet

---
apiVersion: v1
kind: Namespace
metadata:
  name: ns-074
---
apiVersion: v1
kind: Pod
metadata:
  name: busybox-pod
  namespace: ns-074
spec:
  containers:
  - name: busybox
    image: busybox
    args: [/bin/sh, -c, "sleep 3600"]
