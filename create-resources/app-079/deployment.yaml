apiVersion: v1
kind: Namespace
metadata:
  name: ns-079
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-deploy
  namespace: ns-079
  labels:
    app: busybox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: busybox
  template:
    metadata:
      labels:
        app: busybox
    spec:
      containers:
      - name: busybox
        image: busybox
        command: ["sh", "-c", "sleep 3600"]
