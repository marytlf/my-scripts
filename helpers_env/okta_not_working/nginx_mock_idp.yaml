apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rancher-mock-ingress
  namespace: cattle-system # Deploy where Rancher is
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-cookie-domain: "default"
    nginx.ingress.kubernetes.io/proxy-cookie-path: "default"
    # This allows cookies to be shared across the paths
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
spec:
  rules:
  - host: ec2-18-231-122-148.sa-east-1.compute.amazonaws.com
    http:
      paths:
      - path: /saml
        pathType: Prefix
        backend:
          service:
            name: mock-idp-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rancher
            port:
              number: 443
